apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argocd
  namespace: {{ .Values.namespace }}

{{- $size := .Values.size | default "xs" }}
{{- $sizes := .Values.sizes }}
{{- $cfg := index $sizes $size }}
{{- $overrides := .Values.overrides | default dict }}

spec:

  {{- with .Values.extraConfig }}
  extraConfig:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  ## ---------------------------
  ## Controller
  ## ---------------------------
  controller:
    appSync: {{ .Values.controller.appSync | default "10m" | quote }}
    parallelismLimit: {{ .Values.controller.parallelismLimit | default 10 }}
    processors:
      operation: {{ .Values.controller.processors.operation | default 25 }}
      status: {{ .Values.controller.processors.status | default 50 }}

    
