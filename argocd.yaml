🧠 Helper recommandé (propre et générique)
Dans _helpers.tpl :

{{/*
Merge defaults + size + overrides for a component
Usage: include "argocd.mergeComponent" (list . "controller")
*/}}
{{- define "argocd.mergeComponent" -}}
{{- $root := index . 0 -}}
{{- $comp := index . 1 -}}

{{- $sizeName := $root.Values.size | default "xs" -}}
{{- $sizes := $root.Values.sizes -}}
{{- $sizeCfg := index $sizes $sizeName | default dict -}}

{{- $defaults := $root.Values.defaults | default dict -}}
{{- $overrides := $root.Values.overrides | default dict -}}

{{- $def := index $defaults $comp | default dict -}}
{{- $size := index $sizeCfg $comp | default dict -}}
{{- $ovr := index $overrides $comp | default dict -}}

{{- $merged := mergeOverwrite (deepCopy $def) $size $ovr -}}

{{- toYaml $merged -}}
{{- end -}}
🚀 Utilisation dans argocd.yaml
Ultra clean :

controller:
  {{- include "argocd.mergeComponent" (list . "controller") | nindent 2 }}

repoServer:
  {{- include "argocd.mergeComponent" (list . "repoServer") | nindent 2 }}

server:
  {{- include "argocd.mergeComponent" (list . "server") | nindent 2 }}
